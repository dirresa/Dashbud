<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dashbud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #8ed6ff;"> <div id="header"></div> <section class="contact-section">
        <div class="contact-container">
            <h2 class="contact-title">Get in Touch ✧˖°</h2>
            
            <div class="contact-wrapper">
                <div class="contact-info">
            <div class="email-box">
                <div class="email-item">
                    <h3>📧 Customer Support</h3>
                    <a href="mailto:support@deskbuddy.com">support@deskbuddy.com</a>
                </div>
                <div class="email-item">
                    <h3>🤝 Business & Partnerships</h3>
                    <a href="mailto:partners@deskbuddy.com">partners@deskbuddy.com</a>
                </div>
            </div>

            <div class="social-links-contact">
                <h3>📱 Follow Our Journey</h3>
                <div class="social-icon-wrapper">
                    <a href="https://instagram.com/dash.buds" class="social-item">
                        <img src="assets/ig.jpg" alt="Instagram">
                        <span>@dash.buds</span>
                    </a>
                    <a href="https://twitter.com/dashbuds" class="social-item">
                        <img src="assets/twitter.png" alt="Twitter">
                        <span>@dashbuds</span>
                    </a>
                </div>
            </div>

            <form class="contact-form">
                <h3>Send us a message</h3>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="How can we help you?" rows="5" required></textarea>
                <button type="submit" class="cta-btn">Send Message</button>
            </form>
        </div>

                <div class="contact-map">
                    <h3>Find us at YorkU📍</h3>
                    <div class="map-frame">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2880.0526806542616!2d-79.5044436845!3d43.77345347911736!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x882b2fb822538183%3A0xc3940e4f346b0e8c!2sYork%20University!5e0!3m2!1sen!2sca!4v1700000000000!5m2!1sen!2sca" 
                            width="100%" 
                            height="75%" 
                            style="border:0;" 
                            allowfullscreen="" 
                            loading="lazy">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div id="footer"></div> <script src="include.js"></script>
    <script src="script.js"></script>
    <script src="include.js"></script>
</body>
</html>
